{% extends "base/base.html" %}
{% block content %}
<div class="page-header">
  <h1>Clientes</h1>
  <a class="btn btn-primary" href="{% url 'cliente_create' %}">Novo cliente</a>
</div>
<section class="panel">
  <form class="row g-2 mb-3">
    <div class="col">
      <input class="form-control" name="q" value="{{ request.GET.q }}" placeholder="Buscar por nome ou CPF/CNPJ">
    </div>
    <div class="col-auto">
      <button class="btn btn-outline-primary">Buscar</button>
    </div>
  </form>
  <div class="table-responsive">
    <table class="table align-middle">
      <thead><tr><th>Nome</th><th>CPF/CNPJ</th><th>Contato</th><th></th></tr></thead>
      <tbody>
        {% for cliente in object_list %}
          <tr>
            <td>{{ cliente.nome }}</td>
            <td>{{ cliente.cpf_cnpj }}</td>
            <td>{{ cliente.contato }}</td>
            <td class="text-end"><a class="btn btn-sm btn-outline-secondary" href="{{ cliente.get_absolute_url }}">Abrir</a></td>
          </tr>
        {% empty %}
          <tr><td colspan="4" class="text-secondary">Nenhum cliente encontrado.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}

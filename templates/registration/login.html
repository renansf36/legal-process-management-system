<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
  <main class="container py-5">
    <div class="mx-auto card shadow-sm" style="max-width: 420px;">
      <div class="card-body p-4">
        <h1 class="h4 mb-4">Acesso ao sistema</h1>
        {% if form.errors %}
          <div class="alert alert-danger">Usuario ou senha invalidos.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="{{ form.username.id_for_label }}">Usuario</label>
            <input class="form-control" type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="{{ form.password.id_for_label }}">Senha</label>
            <input class="form-control" type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>
      </div>
    </div>
  </main>
</body>
</html>
